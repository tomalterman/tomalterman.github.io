<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games - Tom Alterman</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #000080;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            font-weight: normal;
        }

        .window {
            background: #0000aa;
            width: 90%;
            min-width: 375px;
            max-width: 600px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .title-bar {
            background: #aaaaaa;
            color: #0000aa;
            padding: 8px 12px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }

        .window-body {
            padding: 20px;
            font-size: 16px;
            line-height: 1.6;
        }

        .back-command {
            color: #d4d4d4;
            margin-bottom: 20px;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }

        .back-command:hover { color: #ffffff; }

        .back-command::before {
            content: "$ cd .. && ";
            color: #ffffff;
        }

        .menu {
            list-style: none;
            padding: 0;
            margin: 20px 0 0 0;
        }

        .menu-item {
            margin: 10px 0;
            padding: 10px 8px;
            text-decoration: none;
            color: #ffffff;
            display: block;
            transition: all 0.15s ease;
            font-size: 14px;
        }

        .menu-item::before {
            content: "> ";
            color: #ffffff;
        }

        .menu-item:hover {
            background: #00005a;
            padding-left: 16px;
        }

        .menu-item:active {
            background: #000040;
        }

        .game-title {
            font-weight: bold;
            text-transform: uppercase;
        }

        .game-desc {
            display: block;
            padding-left: 14px;
            margin-top: 4px;
            font-size: 12px;
            color: #d4d4d4;
        }

        .menu-item:hover .game-desc {
            color: #ffffff;
        }

        @media (max-width: 768px) {
            .window-body { padding: 15px; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">T0m.4lt3rm4n.G4M3S</div>
        <div class="window-body">
            <a href="/" class="back-command">home</a>

            <nav class="menu">
                <a href="/ninja-sam/" class="menu-item">
                    <span class="game-title">Ninja Sam</span>
                    <span class="game-desc">Robot Runner &mdash; endless side-scroller built with Leo</span>
                </a>
                <a href="/space-fighter/" class="menu-item">
                    <span class="game-title">Space Fighter</span>
                    <span class="game-desc">Guard the Galaxy &mdash; arcade space shooter</span>
                </a>
                <a href="/tiny-kitty-garden/" class="menu-item">
                    <span class="game-title">Tiny Kitty Garden</span>
                    <span class="game-desc">Cozy tap-to-play garden for small hands</span>
                </a>
                <a href="/dowza/" class="menu-item">
                    <span class="game-title">Dowza</span>
                    <span class="game-desc">Vs. Bowzashine &mdash; fire-world platformer built with Leo</span>
                </a>
            </nav>
        </div>
    </div>
</body>
</html>
